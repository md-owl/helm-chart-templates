# This hook depends on helm creating the target namespace if it doesn't exist
# before the hook is called. This is the case on Helm v2.9.1
# ["kubectl", "-n", {{ include "deploy.fullname" . }}, "rollout", "restart", "deployment", {{ include "deploy.fullname" . }}]
{{- if .Values.istio.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: dp-reloader-{{ include "deploy.fullname" . }}
  namespace: gitlab-runner
  annotations:
    helm.sh/hook: post-install, pre-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    spec:
      containers:
      - name: deploy-reloader
        image: kubectl-helm:v3.6.4
        command:
          - kubectl
          - -n
          - {{ include "deploy.fullname" . }}
          - rollout
          - restart
          - deployment
          - {{ include "deploy.fullname" . }}
      restartPolicy: Never
      # use tiller service account since it should have permissions to do namespace labeling
      serviceAccountName: gitlab-runner-installer
{{ end }}

## RBAC ##
## Создает ServiceAccount
## Создает RoleBinding - по умолчанию 
## Создает Role - как правило используется для работы с Vault-csi в Prod кластере k8s
## Создает PSP(pod security policy) как правило используется для работы с Vault-csi в Prod кластере k8s
## supported values for PSP volume: "*", "awsElasticBlockStore", "azureDisk", "azureFile" 
## "cephFS", "cinder", "configMap", "csi", "downwardAPI", "emptyDir", "ephemeral", "fc", "flexVolume", ## "flocker", "gcePersistentDisk", "gitRepo", "glusterfs", "hostPath", "iscsi", "nfs", 
## "persistentVolumeClaim", "photonPersistentDisk", "portworxVolume", "projected", "quobyte", ## "rbd", "scaleIO", "secret", "storageos", "vsphereVolume"]
serviceAccount:
  create: true
  automountServiceAccountToken: false
  name: ""
  createRbac: false
  rules:
  - apiGroups:
    - policy
    resources:
    - podsecuritypolicies
    resourceNames:
    - vault-$CI_PROJECT_NAME-$ENVIRONMENT-psp #PSP name, same name in "psp"
    verbs:
    - use
  createPsp: false
  psp:
    name: vault-$CI_PROJECT_NAME-$ENVIRONMENT-psp #PSP name
    annotations:
      seccomp.security.alpha.kubernetes.io/allowedProfileNames: docker/default
      seccomp.security.alpha.kubernetes.io/defaultProfileName: docker/default
    spec:
      allowPrivilegeEscalation: true
      privileged: true
      allowedHostPaths:
      - pathPrefix: /var/lib/kubelet/pods
      - pathPrefix: /etc/kubernetes/secrets-store-csi-providers
      fsGroup:
        rule: RunAsAny
      runAsUser:
        rule: RunAsAny
      seLinux:
        rule: RunAsAny
      supplementalGroups:
        rule: RunAsAny
      volumes:
        - csi
        - secret
        - hostPath
        - configMap
        - emptyDir
        - downwardAPI
        - projected
  


# -- csi vault
secretproviderclass:
  enabled: false  
  name: $CI_PROJECT_NAME-$ENVIRONMENT
  provider: vault
  secretObjects:
    - secretName: $CI_PROJECT_NAME-$ENVIRONMENT-secret
      type: Opaque
      data:
        - objectName: SESSION
          key: SESSION
        - objectName: HYDRA_ADMIN_URL
          key: HYDRA_ADMIN_URL
        - objectName: HYDRA_PUBLIC_URL
          key: HYDRA_PUBLIC_URL
        - objectName: COOKIES_DOMAIN
          key: COOKIES_DOMAIN
  parameters:
    vaultAddress: "http://vault.vault.svc:8200"
    roleName: "$CI_PROJECT_NAME-$ENVIRONMENT"
    objects: |
      - objectName: "SESSION"
        secretPath: secret/data/$ENVIRONMENT/ory/$CI_PROJECT_NAME-$ENVIRONMENT
        secretKey: SESSION
      - objectName: "HYDRA_ADMIN_URL"
        secretPath: secret/data/$ENVIRONMENT/ory/$CI_PROJECT_NAME-$ENVIRONMENT
        secretKey: HYDRA_ADMIN_URL
      - objectName: "HYDRA_PUBLIC_URL"
        secretPath: secret/data/$ENVIRONMENT/ory/$CI_PROJECT_NAME-$ENVIRONMENT
        secretKey: HYDRA_PUBLIC_URL
      - objectName: "COOKIES_DOMAIN"
        secretPath: secret/data/$ENVIRONMENT/ory/$CI_PROJECT_NAME-$ENVIRONMENT
        secretKey: COOKIES_DOMAIN

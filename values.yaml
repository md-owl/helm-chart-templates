# -- Istio Virtual Service
## by default host: fullName, portNumber: svcPort
istio:
  name: "$CI_PROJECT_NAME-$ENVIRONMENT-external"
  enabled: false
  namespace: "$CI_PROJECT_NAME-$ENVIRONMENT"
  annotations: {}
  spec:
    hosts: "$CI_PROJECT_NAME-$ENVIRONMENT.$URLVARIBLESISIO"
    http: 
      route:
        destination:
            host: "" # override service, default will be  $fullName
            port:
              number: "" # override port default will be $svcPort

# -- Canary template
canary:
  enabled: false
  revertOnDeletion: false # https://docs.flagger.app/usage/how-it-works#canary-finalizers
  disableDefaultMetrics: false # Disable custom metrics https://docs.flagger.app/usage/metrics#builtin-metrics, and Istio metrics: https://github.com/fluxcd/flagger/blob/main/pkg/metrics/observers/istio.go
  service:
    portDiscovery: true  
  # Istio traffic policy tls can be DISABLE or ISTIO_MUTUAL
  istioTLS: DISABLE
  istioIngress:
    enabled: false # Включать если нужно создать vitrualservice с помощью flagger
    # Istio ingress gateway name
    gateway: istio-ingress/cross-network-gateway
    # external host istio URL
    host: "$CI_PROJECT_NAME-$ENVIRONMENT.$URLVARIBLESISIO"
  analysis:
    # schedule interval (default 60s)
    interval: 10s
    # max number of failed metric checks before rollback
    threshold: 10
    # max traffic percentage routed to canary
    # percentage (0-100)
    maxWeight: 70
    # canary increment step
    # percentage (0-100)
    stepWeight: 5
  thresholds:
    # minimum req success rate (non 5xx responses)
    # percentage (0-100)
    successRate: 99
    # maximum req duration P99
    # milliseconds
    latency: 500
  # https://docs.flagger.app/usage/metrics#custom-metrics
  customAnalysis: 
    enabled: false
    templates: # Можно передать массив templates
      - name: metric-name
        templateRef:
          name: metric-template-name
          namespace: namespace # Default value "canary"
        thresholdRange: # accepted values
          min: 10
          max: 1000
        interval: 1m  # metric query time window
  loadtest:
    enabled: true
    # load tester address
    url: http://loadtester.flagger.svc/
  helmtest:
    enabled: false
    # helm tester address
    url: http://flagger-helmtester.kube-system/

